# CI gate — SOC 2 change-management evidence (gap T-10, CC8.1).
# Every push/PR to main must pass typecheck, server+client tests, build,
# a production-dependency audit (high+), and a repository secret scan.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck, tests, build, audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Server tests
        run: pnpm test:server

      - name: Client tests
        run: pnpm test:client

      - name: Build
        run: pnpm build

      - name: Production dependency audit (fail on high+)
        run: pnpm audit --prod --audit-level=high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans all commits

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

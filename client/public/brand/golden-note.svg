<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Glowing golden note">
  <!-- Background: deep purple/black matching the app's canvas -->
  <defs>
    <!-- Gold gradient for the note itself -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4b8" />
      <stop offset="35%" stop-color="#ffd94a" />
      <stop offset="70%" stop-color="#e8a923" />
      <stop offset="100%" stop-color="#a66f0a" />
    </linearGradient>
    <!-- Highlight gradient on the note head -->
    <radialGradient id="goldHighlight" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#fffde7" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#ffd94a" stop-opacity="0" />
    </radialGradient>
    <!-- Radial glow behind the note -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffd94a" stop-opacity="0.65" />
      <stop offset="45%" stop-color="#ffa500" stop-opacity="0.22" />
      <stop offset="80%" stop-color="#a855f7" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0a0015" stop-opacity="0" />
    </radialGradient>
    <!-- Background radial gradient -->
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0%" stop-color="#221033" />
      <stop offset="60%" stop-color="#0f0720" />
      <stop offset="100%" stop-color="#050010" />
    </radialGradient>
    <!-- Heavy blur for the outer glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="42" />
    </filter>
    <filter id="tightGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background canvas -->
  <rect width="1024" height="1024" fill="url(#bg)" />

  <!-- Big soft glow halo -->
  <circle cx="512" cy="512" r="360" fill="url(#glow)" filter="url(#softGlow)" />

  <!-- Eighth-note body: stem + head + flag, stroked with the gold gradient -->
  <!-- Using a <g> with the tight-glow filter for crisp-but-luminous edges -->
  <g filter="url(#tightGlow)">
    <!-- Stem -->
    <rect x="584" y="280" width="30" height="400" rx="6" fill="url(#gold)" />
    <!-- Flag (curved) -->
    <path
      d="M 614 280
         C 720 320, 800 420, 760 560
         C 770 470, 720 400, 614 430
         Z"
      fill="url(#gold)"
    />
    <!-- Note head (oval, tilted slightly) -->
    <ellipse cx="510" cy="680" rx="110" ry="82" fill="url(#gold)" transform="rotate(-18 510 680)" />
    <!-- Specular highlight on the head -->
    <ellipse cx="510" cy="680" rx="110" ry="82" fill="url(#goldHighlight)" transform="rotate(-18 510 680)" />
  </g>

  <!-- Small sparkle near the flag tip -->
  <g opacity="0.8">
    <circle cx="790" cy="300" r="6" fill="#fffde7" filter="url(#tightGlow)" />
    <circle cx="760" cy="320" r="3" fill="#fffde7" />
    <circle cx="810" cy="330" r="3" fill="#fffde7" />
  </g>
</svg>
